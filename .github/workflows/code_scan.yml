name: AI Code Analysis

# Run this workflow on every push and pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository's code
      - name: Check out code
        uses: actions/checkout@v4

      # 2. --- UPDATED: Download and Install CodeQL in a separate folder ---
      - name: Install CodeQL CLI
        run: |
          # Create and enter a temporary directory outside the repo
          mkdir -p /tmp/codeql_setup
          cd /tmp/codeql_setup

          echo "Downloading CodeQL CLI..."
          wget -q https://github.com/github/codeql-action/releases/latest/download/codeql-bundle-linux64.tar.gz
          
          echo "Extracting CodeQL..."
          tar -xzf codeql-bundle-linux64.tar.gz
          
          # Add the extracted codeql folder (now in /tmp) to the GitHub runner's PATH
          echo "$PWD/codeql" >> $GITHUB_PATH

          # Return to the original repository workspace
          cd $GITHUB_WORKSPACE

      # 3. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. Install Python dependencies (New Gemini SDK + Requests)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Installed the updated 'google-genai' and 'requests' for NVD integration
          pip install langchain-core google-genai requests

      # 5. Run the AI code scan
      - name: Run AI Code Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Recommended: Add your NVD API key to GitHub Secrets to avoid rate limits
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }} 
        run: |
          # Create an empty report file to ensure it always exists
          touch analysis_report.md
          
          # Run the scanner script
          python scan.py 

      # 6. Add the report content to the GitHub Actions job summary page
      - name: Add report to Job Summary
        run: |
          echo '## AI Code Analysis Report' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          cat analysis_report.md >> $GITHUB_STEP_SUMMARY
