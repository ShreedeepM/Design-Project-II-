# .github/workflows/code_scan.yml

name: AI Code Analysis

# Run this workflow on every push and pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    # Use the latest version of Ubuntu to run the job
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository's code
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # You can change this to your preferred version

      # 3. Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Manually install if requirements.txt is missing
          pip install langchain-core google-generativeai

      # 4. Run the AI code scan
      # This securely passes the API key from GitHub Secrets
      # to the script as an environment variable.
      - name: Run AI Code Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # --- ADDED THIS LINE ---
          # Create an empty report file to ensure it always exists
          touch ai_code_analysis_report.md
          
          # Make sure your Python script is named scan.py
          # or update this line to 'python langchain_analyzer.py'
          python scan.py 

      # 5. --- SIMPLIFIED STEP ---
      # Add the report content to the GitHub Actions job summary page
      - name: Add report to Job Summary
        run: |
          echo '## AI Code Analysis Report' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          # We no longer need the 'if' check, as the file is guaranteed to exist.
          cat ai_code_analysis_report.md >> $GITHUB_STEP_SUMMARY

