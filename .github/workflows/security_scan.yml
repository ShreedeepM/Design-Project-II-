# This file goes in your repository at this exact path:
# .github/workflows/security_scan.yml

name: 'LLM Security Scan'

# Trigger the workflow on pull request events
on:
  pull_request:
    types: [opened, synchronize] # Run on new PRs and when new commits are pushed

permissions:
  contents: read      # To check out the code
  pull-requests: write # To write comments on the PR

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository code
      - name: 'Checkout code'
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: 'Set up Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: 'Install dependencies'
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. Run the scan script
      - name: 'Run LLM Security Scan'
        run: python scan.py
        env:
          # Pass the GitHub token and PR info to the script
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Pass the Gemini API key from repository secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
