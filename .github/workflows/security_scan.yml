# This file goes in your repository at this exact path:
# .github/workflows/security_scan.yml

name: 'LLM Security Scan'

# Trigger the workflow on push events to any branch
on:
  push:

permissions:
  contents: read    # To check out code and read repository contents
  commits: write  # To write comments on the commit

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository code at the specific commit
      - name: 'Checkout code'
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: 'Set up Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: 'Install dependencies'
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. Run the scan script
      - name: 'Run LLM Security Scan'
        run: python scan.py
        env:
          # Pass the GitHub token and commit info to the script
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          # Pass the Gemini API key from repository secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

